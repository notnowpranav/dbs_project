<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-SCAE — Register</title>
  <style>
    :root { --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8; --primary: #534AB7; --primary-light: #EEEDFE; --primary-dark: #3C3489; --text: #2c2c2a; --muted: #5f5e5a; --danger: #A32D2D; --success: #0F6E56; --warning: #BA7517; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.06);
      padding: 26px;
    }
    .brand { text-align: center; margin-bottom: 16px; }
    .brand .h { font-size: 22px; font-weight: 1000; color: var(--primary); }
    .brand .p { margin-top: 6px; font-size: 13px; color: var(--muted); }
    .flash { padding: 10px 12px; border-radius: 10px; font-size: 13px; margin: 0 0 14px; border: 1px solid var(--border); background: #fff; }
    .flash.success { border-color: rgba(15,110,86,0.35); background: #EAF3DE; color: #2D5A29; }
    .flash.danger  { border-color: rgba(163,45,45,0.35); background: #FCEBEB; color: var(--danger); }
    .flash.warning { border-color: rgba(186,117,23,0.35); background: #FAEEDA; color: #7A4A0A; }

    form { display: grid; gap: 12px; margin-top: 6px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 520px) { .row { grid-template-columns: 1fr; } }
    label { font-size: 12px; font-weight: 900; }
    input, select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    input:focus, select:focus { border-color: rgba(83,74,183,0.45); box-shadow: 0 0 0 4px rgba(83,74,183,0.10); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 900;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: rgba(83,74,183,0.35); color: var(--primary); }
    .actions { display: grid; gap: 10px; margin-top: 4px; }
    .foot { text-align: center; margin-top: 14px; font-size: 13px; color: var(--muted); }
    .foot a { color: var(--primary); text-decoration: none; font-weight: 900; }
    .foot a:hover { text-decoration: underline; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="h">Create your D-SCAE account</div>
      <div class="p">Student registration</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/register">
      <div class="row">
        <div>
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required autocomplete="username">
        </div>
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required autocomplete="email">
        </div>
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="new-password">
        <div class="hint">This password is stored securely as a SHA-256 hash in the database.</div>
      </div>

      <div class="row">
        <div>
          <label for="branch">Branch</label>
          <input id="branch" name="branch" type="text" required>
        </div>
        <div>
          <label for="cgpa">CGPA</label>
          <input id="cgpa" name="cgpa" type="number" step="0.01" min="0" max="10" required>
        </div>
      </div>

      <div>
        <label for="semester">Semester</label>
        <input id="semester" name="semester" type="text" placeholder="e.g., 6" required>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Create account</button>
        <a class="btn btn-outline" href="/login">Back to login</a>
      </div>
    </form>

    <div class="foot">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>
</body>
</html>
