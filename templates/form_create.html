<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-SCAE — Create Form</title>
  <style>
    :root { --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8; --primary: #534AB7; --primary-light: #EEEDFE; --primary-dark: #3C3489; --text: #2c2c2a; --muted: #5f5e5a; --danger: #A32D2D; --success: #0F6E56; --warning: #BA7517; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 28px 16px; }
    .card {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.06);
      padding: 26px;
    }
    .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .title { font-size: 20px; font-weight: 1000; }
    .sub { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .link { font-size: 12px; color: var(--muted); text-decoration: none; padding: 6px 10px; border-radius: 10px; border: 1px solid var(--border); background: #fff; }
    .link:hover { border-color: rgba(83,74,183,0.35); color: var(--primary); }

    .flash { padding: 10px 12px; border-radius: 10px; font-size: 13px; margin: 0 0 14px; border: 1px solid var(--border); background: #fff; }
    .flash.success { border-color: rgba(15,110,86,0.35); background: #EAF3DE; color: #2D5A29; }
    .flash.danger  { border-color: rgba(163,45,45,0.35); background: #FCEBEB; color: var(--danger); }
    .flash.warning { border-color: rgba(186,117,23,0.35); background: #FAEEDA; color: #7A4A0A; }

    form { display: grid; gap: 12px; margin-top: 8px; }
    label { font-size: 12px; font-weight: 900; }
    input, textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      outline: none;
      resize: vertical;
    }
    input:focus, textarea:focus { border-color: rgba(83,74,183,0.45); box-shadow: 0 0 0 4px rgba(83,74,183,0.10); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 14px; border-radius: 10px; font-size: 13px; font-weight: 900; border: none; cursor: pointer; text-decoration: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: rgba(83,74,183,0.35); color: var(--primary); }
    .actions { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <div class="title">Create a new form</div>
          <div class="sub">Define the form details, then you’ll be taken to add fields and access rules.</div>
        </div>
        <a class="link" href="/dashboard">Back to dashboard</a>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="/forms/new">
        <div>
          <label for="title">Title</label>
          <input id="title" name="title" type="text" placeholder="e.g., Internship Registration" required>
        </div>

        <div>
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4" placeholder="Short description shown to students." required></textarea>
        </div>

        <div class="row">
          <div>
            <label for="start_date">Start date</label>
            <input id="start_date" name="start_date" type="date" required>
          </div>
          <div>
            <label for="end_date">End date</label>
            <input id="end_date" name="end_date" type="date" required>
          </div>
        </div>

        <div class="actions">
          <a class="btn btn-outline" href="/dashboard">Cancel</a>
          <button class="btn btn-primary" type="submit">Create form</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
